<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OMbot - {{SLUG}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px 30px; border-bottom: 2px solid #00d4ff33; display: flex; align-items: center; gap: 15px; }
    .header h1 { font-size: 24px; color: #00d4ff; }
    .header .ch { background: #00d4ff22; color: #00d4ff; padding: 4px 12px; border-radius: 6px; font-size: 14px; }
    .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
    .card { background: #12121a; border: 1px solid #2a2a3a; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card h2 { color: #00d4ff; margin-bottom: 16px; font-size: 18px; }
    .fr { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .fr input { flex: 1; min-width: 150px; padding: 10px 14px; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; }
    .fr input:focus { border-color: #00d4ff; outline: none; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
    .bp { background: #00d4ff; color: #000; }
    .bp:hover { background: #00b8d4; transform: translateY(-1px); }
    .bd { background: #ff4444; color: #fff; font-size: 12px; padding: 6px 12px; }
    .bd:hover { background: #cc3333; }
    .bt { font-size: 12px; padding: 6px 12px; }
    .bon { background: #00c853; color: #000; }
    .boff { background: #555; color: #ccc; }
    .tl { display: flex; flex-direction: column; gap: 10px; }
    .ti { display: flex; align-items: center; gap: 12px; background: #1a1a2e; padding: 14px 16px; border-radius: 8px; border-left: 3px solid #00d4ff; }
    .ti.off { opacity: 0.5; border-left-color: #555; }
    .tm { flex: 1; font-size: 14px; word-break: break-word; }
    .tinf { color: #888; font-size: 12px; white-space: nowrap; cursor: pointer; }
    .tinf:hover { color: #00d4ff; }
    .tinf input { width: 50px; padding: 2px 6px; background: #0a0a0f; border: 1px solid #00d4ff; border-radius: 4px; color: #fff; font-size: 12px; text-align: center; }
    .ta { display: flex; gap: 6px; }
    .empty { text-align: center; color: #666; padding: 30px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 OMbot Panel</h1>
    <span class="ch">{{SLUG}}</span>
  </div>
  <div class="container">
    <div class="card">
      <h2>➕ Yeni Zamanlı Mesaj</h2>
      <div class="fr">
        <input type="text" id="msg" placeholder="Mesaj metni...">
      </div>
      <div class="fr">
        <input type="number" id="iv" placeholder="Dakika" min="1" value="10" style="max-width:120px">
        <button class="btn bp" onclick="addTimer()">Ekle</button>
      </div>
    </div>
    <div class="card">
      <h2>📋 Zamanlı Mesajlar</h2>
      <div id="list" class="tl">
        <div class="empty">Yükleniyor...</div>
      </div>
    </div>
  </div>
  <script>
    const SLUG = '{{SLUG}}';
    const KEY = '{{KEY}}';
    const API = '/api/timers/' + SLUG + '?key=' + KEY;

    async function loadTimers() {
      const res = await fetch(API);
      const timers = await res.json();
      const list = document.getElementById('list');
      if (!timers.length) {
        list.innerHTML = '<div class="empty">Henüz zamanlı mesaj yok.</div>';
        return;
      }
      list.innerHTML = timers.map(function(t) {
        return '<div class="ti ' + (t.enabled ? '' : 'off') + '">'
          + '<div class="tm">' + t.message + '</div>'
          + '<span class="tinf" onclick="editInterval(\'' + t.id + '\',' + t.interval + ',this)" title="Tıkla değiştir">' + t.interval + ' dk</span>'
          + '<div class="ta">'
          + '<button class="btn bt ' + (t.enabled ? 'bon' : 'boff') + '" onclick="toggleTimer(\'' + t.id + '\',' + !t.enabled + ')">' + (t.enabled ? 'ON' : 'OFF') + '</button>'
          + '<button class="btn bd" onclick="deleteTimer(\'' + t.id + '\')">Sil</button>'
          + '</div></div>';
      }).join('');
    }

    function editInterval(id, current, el) {
      el.innerHTML = '<input type="number" min="1" value="' + current + '" onblur="saveInterval(\'' + id + '\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()" autofocus>';
      el.querySelector('input').focus();
    }

    async function saveInterval(id, val) {
      var v = parseInt(val);
      if (!v || v < 1) { loadTimers(); return; }
      await fetch('/api/timers/' + SLUG + '/' + id + '?key=' + KEY, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ interval: v })
      });
      loadTimers();
    }

    async function addTimer() {
      var m = document.getElementById('msg').value.trim();
      var i = document.getElementById('iv').value;
      if (!m) return alert('Mesaj boş!');
      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: m, interval: i })
      });
      document.getElementById('msg').value = '';
      loadTimers();
    }

    async function deleteTimer(id) {
      if (!confirm('Silmek istediğine emin misin?')) return;
      await fetch('/api/timers/' + SLUG + '/' + id + '?key=' + KEY, { method: 'DELETE' });
      loadTimers();
    }

    async function toggleTimer(id, enabled) {
      await fetch('/api/timers/' + SLUG + '/' + id + '?key=' + KEY, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled: enabled })
      });
      loadTimers();
    }

    loadTimers();
  </script>
</body>
</html>
